name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: rez-sdk
      - uses: actions/checkout@v4
        with:
          repository: rezprotocol/rez-core
          path: rez-core
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      # The @rezprotocol/* cross-deps are unpublished (npm scope is locked), so a
      # standalone `npm install` of the `^0.2.0` ranges hits the registry and
      # 404s. Resolve them from the checked-out sibling repo(s) via an ephemeral
      # npm workspace root: local workspace packages satisfy the semver ranges,
      # exactly like the source monorepo's install. Drop this once the scope is
      # published — then a plain `npm install` resolves from the registry.
      - name: Create workspace root (resolve unpublished siblings)
        run: |
          cat > package.json <<'JSON'
          {
            "name": "ci-workspace-root",
            "private": true,
            "workspaces": ["rez-core", "rez-sdk"]
          }
          JSON
      - run: npm install --no-audit --no-fund
      - run: npm test
        working-directory: rez-sdk
